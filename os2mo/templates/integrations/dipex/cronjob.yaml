---
{{- range $i, $value := .Values.dipex.cronjobs }}
{{ if $value.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-dipex-
  labels:
    app: dipex
  {{- with .Values.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ $value.schedule | quote }}
  timeZone: {{ .Values.timezone | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cronjob-dipex-
              image: "{{ .Values.dipex.image.registry }}/{{ .Values.dipex.image.repository }}:{{ .Values.dipex.image.tag }}"
              command: {{ $value.command}}
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "5m"
                limits:
                  memory: "128Mi"
                  cpu: "10m"
          restartPolicy: Never
{{- end }}
{{- end }}
